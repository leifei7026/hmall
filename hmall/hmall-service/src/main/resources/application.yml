server:
  port: 8080

spring:
  application:
    name: hmall-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hmall?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: "123"
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.100.128:8848
        enabled: true

mybatis-plus:
  configuration:
    # 下划线转驼峰：logistics_company → logisticsCompany
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 逻辑删除字段名
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志级别
logging:
  level:
    com.hmall: debug
